name: ayurveda
description: "A new Flutter project."
publish_to: "none"
version: 1.1.10

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.1.0
  flutter_html: ^3.0.0-beta.2
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  flutter_launcher_icons: ^0.13.1
  package_rename: ^1.7.0
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3
  share_plus: ^10.1.4
  image_picker: ^1.0.7
  flutter_native_splash: ^2.4.4
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launcher_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android_12:
    color: "#ffffff"
    image: assets/images/logo.png

package_rename_config:
  android:
    app_name: "Aayurveda"
    package_name: "ayurveda.stime.in"
    override_old_package:
    lang:

  ios:
    app_name: "Aayurveda"
    bundle_name: "Aayurveda"
    package_name: "aayurveda.stime.in"

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300
        - asset: assets/fonts/OpenSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/OpenSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-ExtraBold.ttf
          weight: 800
